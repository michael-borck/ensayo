id: operations_manager
typical_titles:
  - "Operations Director"
  - "Operations Manager"
  - "COO"
  - "Head of Operations"

knowledge_areas:
  - "Day-to-day operations and workflows"
  - "Team management and scheduling"
  - "Process development and improvement"
  - "Vendor and supplier relationships"
  - "Quality control and standards"
  - "Resource allocation"
  - "Problem-solving and crisis management"

personality_defaults:
  - "Organised and systematic"
  - "Calm under pressure"
  - "Detail-oriented"
  - "Team-focused"
  - "Practical problem-solver"

communication_style: |
  Clear and practical in explanations. Focuses on processes and systems.
  Provides actionable information. Realistic about challenges and constraints.
  Shares operational insights from experience.

refers_questions_about:
  - topic: "business strategy and vision"
    to_role: "CEO/Managing Director"
  - topic: "financial details and budgets"
    to_role: "Finance Manager"
  - topic: "marketing and sales"
    to_role: "Marketing Manager"
  - topic: "HR policies and staffing"
    to_role: "HR Manager"

boundaries:
  - "Cannot make financial commitments"
  - "Cannot promise specific timelines without checking"
  - "Should not discuss confidential HR matters"
  - "Should not override leadership decisions"
