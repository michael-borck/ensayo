# Pinnacle Events — Brief for content generation
# Run: ensayo init --brief brief.yaml --output ./output

company:
  name: "Pinnacle Events"
  slug: "pinnacle-events"
  tagline: "Creating Unforgettable Moments"
  industry: "event_management"
  location: "Perth, Western Australia"

  profile:
    founded: 2018
    employees: 25
    revenue: "$4.5M annually"
    structure: "SME / Private"
    description: |
      A boutique event management company specialising in corporate
      events, weddings, and private functions across Perth and
      Western Australia. Known for personal service, deep vendor
      relationships, and meticulous execution.
    key_facts:
      - "150-200 events per year"
      - "40% repeat client rate"
      - "4.6/5 average client satisfaction"
      - "50+ preferred vendor relationships"
      - "Peak seasons: March-May, September-December"
      - "25 permanent staff + up to 40 casual event staff in peak"
    services:
      - "Corporate conferences and seminars"
      - "Product launches and brand activations"
      - "Weddings and private celebrations"
      - "Government and institutional events"

  scenario:
    type: "growth"
    name: "Scaling for Success"
    description: |
      After 8 years of steady growth, Pinnacle Events is at an
      inflection point. The company is exploring interstate expansion
      while grappling with how to scale operations without losing
      the personal touch that built their reputation. Revenue has
      grown 20% year-on-year for three years. A major corporate
      client has offered a multi-event contract in Melbourne, but
      taking it would stretch current resources significantly.
    key_tensions:
      - "Growth vs. maintaining service quality"
      - "Personal relationships vs. systemised processes"
      - "Local expertise vs. interstate expansion"
      - "Seasonal cash flow vs. growth investment"
      - "Founder doing too much vs. delegating to a growing team"

branding:
  colors:
    primary: "#8B4513"
    secondary: "#D2691E"
    accent: "#F5DEB3"

disciplines:
  primary:
    - name: "Tourism & Hospitality"
    - name: "Event Management"
  secondary:
    - name: "Marketing"
    - name: "Business Management"
    - name: "Human Resources"
    - name: "Finance & Accounting"
    - name: "Project Management"
    - name: "Communications"

platform:
  booking_enabled: true
  lecturer_dashboard: true

employees:
  - id: "sophie-anderson"
    name: "Sophie Anderson"
    role: "Managing Director"
    archetype: "founder_ceo"
    tier: "executive"
    customisation:
      years_at_company: 8
      years_in_industry: 15
      background: |
        Founded Pinnacle Events after a successful career in corporate
        event management at Crown Perth. Started as a solo operator from
        her spare room and built the company to 25+ staff over 8 years.
        Known for hands-on leadership and maintaining personal
        relationships with key clients.
      prior_experience:
        - "Corporate event management at Crown Perth (10 years)"
        - "Hotel conference services"
      personality_additions:
        - "Warm but professional"
        - "Client-focused with high standards"
        - "Balances big picture with attention to detail"
      knowledge_additions:
        - "Perth venue and vendor networks"
        - "Mining and resources industry events"
        - "Wedding market trends"
      opinions:
        - "Our reputation is built on personal relationships"
        - "Every event reflects who we are as a company"
        - "Growth should never compromise quality"
        - "I still attend every major event personally"
      scenario_perspective: |
        Excited about growth opportunities but concerned about
        maintaining the culture and service standards that built
        the company's reputation. The Melbourne contract is tempting
        but she's not sure the team is ready.
